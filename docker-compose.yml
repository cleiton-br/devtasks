services:
  db:
    image: postgres:16-alpine
    container_name: devtasks-db
    restart: always
    environment:
      POSTGRES_USER: devtasks_user
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: devtasks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devtasks_user -d devtasks"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: devtasks-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://devtasks_user:123456@db:5432/devtasks
      JWT_SECRET: devtasks-secret-key
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "node src/server.js & sleep 3 && node seed.js && wait"

  frontend:
    build: ./frontend
    container_name: devtasks-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: